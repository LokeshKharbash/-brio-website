<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2980"/>
      <stop offset="50%" style="stop-color:#0066cc"/>
      <stop offset="100%" style="stop-color:#26d0ce"/>
    </linearGradient>
    <linearGradient id="pixelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#1a2980"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGrad)" rx="20"/>
  <!-- Letter B shape -->
  <text x="45" y="148" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="130" fill="url(#bGrad)" letter-spacing="-5">B</text>
  <!-- Pixel dots (top-left scatter) -->
  <rect x="28" y="62" width="12" height="12" rx="2" fill="url(#pixelGrad)" opacity="0.9"/>
  <rect x="44" y="52" width="10" height="10" rx="2" fill="url(#pixelGrad)" opacity="0.7"/>
  <rect x="44" y="66" width="8"  height="8"  rx="2" fill="url(#pixelGrad)" opacity="0.5"/>
  <rect x="30" y="78" width="8"  height="8"  rx="2" fill="url(#pixelGrad)" opacity="0.6"/>
  <rect x="56" y="58" width="7"  height="7"  rx="2" fill="#00ccff" opacity="0.4"/>
  <rect x="22" y="88" width="6"  height="6"  rx="2" fill="#26d0ce" opacity="0.3"/>
  <!-- Shield icon (bottom-right of B) -->
  <g transform="translate(118, 120)">
    <path d="M18 2 L4 8 L4 18 C4 25 11 31 18 34 C25 31 32 25 32 18 L32 8 Z"
          fill="#0a1a3a" stroke="#26d0ce" stroke-width="1.5" opacity="0.9"/>
    <polyline points="11,18 16,23 25,12" stroke="#26d0ce" stroke-width="2.5"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
